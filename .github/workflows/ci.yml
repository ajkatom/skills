# M47 condition #10: minimal CI that runs the dark-factory HERMETIC test suite
# on every push and PR. The runtime is STDLIB-ONLY (no third-party imports in
# scripts/ -- verified below), so there are no dependencies to pin or lock: the
# stock python3 on the runner is the whole toolchain. This workflow IS the "CI
# validation" the external audit asked for.
#
# Hermetic by construction: DF_ALLOW_NETWORK_TESTS is NOT set, so the handful of
# tests that reach outside localhost (live OSV/api probes, the live candidate-
# network e2e) skip themselves rather than making real external connections.
# The probes are not weakened -- they still run in an opt-in job that exports
# DF_ALLOW_NETWORK_TESTS=1.
name: ci

on:
  push:
  pull_request:

jobs:
  hermetic-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Assert the runtime is stdlib-only (nothing to pin)
        run: |
          cd dark-factory
          # No third-party import anywhere under scripts/: if this greps a hit,
          # the "stdlib-only, nothing to pin" claim is false and CI must fail.
          ! grep -rEn '^\s*(import|from)\s+(requests|numpy|pandas|pytest|yaml|docker)\b' scripts/
      - name: Run the hermetic test suite
        run: |
          cd dark-factory
          # Default pytest: DF_ALLOW_NETWORK_TESTS unset -> external-network
          # tests skip -> the run touches nothing outside localhost.
          python -m pip install --upgrade pytest
          python -m pytest -q
